name: Maven Build

on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Spigot BuildTools artifacts
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/spigotmc
          key: spigot-26.1.2
          restore-keys: spigot-

      - name: Build and install Spigot via BuildTools
        uses: SpraxDev/Action-SpigotMC@v5
        with:
          versions: 26.1.2
          remapped: true
          generateSrc: false
          generateDoc: false

      - name: Build and Run Tests
        run: mvn -B package --file pom.xml

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlightedMC-Plugin
          path: target/*.jar
          retention-days: 5